<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard UPH · Hisense AMI</title>
  <script>
    // Auto-scale para TV vía HDMI: si la pantalla es más ancha que 1920px
    // (ej. 4K 3840px), hace zoom proporcional para que se vea igual que en 1920px
    (function() {
      const TARGET_W = 1920;
      function aplicarZoom() {
        const sw = window.screen.width;   // píxeles CSS de la pantalla actual
        if (sw <= TARGET_W) return;       // pantalla normal, sin cambios
        const scale = sw / TARGET_W;      // ej. 3840/1920 = 2
        document.documentElement.style.zoom   = scale.toFixed(4);
        document.documentElement.style.width  = (100 / scale).toFixed(4) + 'vw';
        document.documentElement.style.height = (100 / scale).toFixed(4) + 'vh';
        document.documentElement.style.overflow = 'hidden';
      }
      document.addEventListener('DOMContentLoaded', aplicarZoom);
      window.addEventListener('resize', aplicarZoom);
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #040f0e; color: #e0f7f5;
      font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      height: 50px; flex-shrink: 0;
      display: flex; align-items: center;
      padding: 0 16px; position: relative;
      background: linear-gradient(90deg, #061412, #061412, #061412);
      border-bottom: 1px solid #0a2e2a;
    }
    .h-logo-wrap { display: flex; align-items: center; gap: 10px; }
    .h-logo  { font-size: 2.8rem; font-weight: 900; letter-spacing: 3px;
               color: #00c8b8; text-shadow: 0 0 28px #00c8b888; }
    .h-sep   { width: 1px; height: 26px; background: #0a2e2a; margin: 0 10px; }
    .h-title { display: flex; align-items: center; gap: 8px; }
    .h-live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #00c8b8; flex-shrink: 0;
      box-shadow: 0 0 8px #00c8b8;
      animation: blink-live 1.5s ease-in-out infinite;
    }
    .h-live-dot.err { background: #ff4040; box-shadow: 0 0 8px #ff4040; }
    @keyframes blink-live { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
    .h-live-text { font-size: 0.78rem; font-weight: 700; color: #00c8b8;
                   letter-spacing: 2px; text-transform: uppercase;
                   text-shadow: 0 0 10px #00c8b855; }
    .h-live-sub  { font-size: 0.58rem; font-weight: 600; color: #00856e;
                   letter-spacing: 1.5px; text-transform: uppercase; }
    .h-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: row; align-items: center; gap: 14px;
    }
    .h-sep { width: 1px; height: 28px; background: #0a4a40; }
    .h-empresa { font-size: 1.1rem; font-weight: 600; color: #00856e; white-space: nowrap; letter-spacing: 1px; }
    .h-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
    .h-turnos { display: flex; gap: 6px; }
    .t-pill { padding: 3px 14px; border-radius: 16px; font-size: 0.72rem; font-weight: 700;
              border: 1px solid #0a2e2a; color: #1a4040; background: #061412; transition: all 0.4s; }
    .t-pill.act-A { background: #00877a; color: #fff; border-color: #00c8b8; box-shadow: 0 0 18px #00c8b877; padding: 4px 18px; font-size: 0.82rem; }
    .t-pill.act-B { background: #00877a; color: #fff; border-color: #00c8b8; box-shadow: 0 0 18px #00c8b877; padding: 4px 18px; font-size: 0.82rem; }
    .t-pill.act-C { background: #00877a; color: #fff; border-color: #00c8b8; box-shadow: 0 0 18px #00c8b877; padding: 4px 18px; font-size: 0.82rem; }
    .h-clock { font-size: 1.65rem; font-weight: 200; letter-spacing: 3px;
               color: #00c8b8; font-variant-numeric: tabular-nums;
               text-shadow: 0 0 28px #00c8b844; }
    /* Bolsa dinero */
    .h-monitor { flex-shrink: 0; cursor: pointer; text-decoration: none;
                 display: flex; align-items: center; justify-content: center;
                 font-size: 2.4rem; line-height: 1;
                 filter: drop-shadow(0 0 10px #ffd70099);
                 animation: money-pulse 2s ease-in-out infinite;
                 transition: transform 0.2s; }
    .h-monitor:hover { transform: scale(1.2); filter: drop-shadow(0 0 20px #ffd700cc); }
    @keyframes money-pulse {
      0%,100% { filter: drop-shadow(0 0 8px #ffd70066); }
      50%      { filter: drop-shadow(0 0 22px #ffd700ff) drop-shadow(0 0 40px #ffd70066); }
    }
    .h-tendencias {
      flex-shrink: 0; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; line-height: 1;
      filter: drop-shadow(0 0 8px #00c8b855);
      transition: transform 0.2s, filter 0.2s;
    }
    .h-tendencias:hover { transform: scale(1.2); filter: drop-shadow(0 0 16px #00c8b8cc); }

    /* ─── LAYOUT ─────────────────────────────────────── */
    .main { flex: 1; min-height: 0; padding: 6px; display: flex; gap: 6px; }
    .lines-grid {
      flex: 1; min-width: 0; height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 10px;
    }

    /* ─── CARD ───────────────────────────────────────── */
    .card {
      background: #061412; border: 1px solid #0a2e2a;
      border-radius: 16px; display: flex; flex-direction: column;
      overflow: hidden; transition: border-color 0.5s, box-shadow 0.5s;
    }
    .card.verde    { border-color: #00877a99; box-shadow: 0 0 22px #00877a18; }
    .card.amarillo { border-color: #cc770066; box-shadow: 0 0 22px #cc770012; }
    .card.rojo     { border-color: #cc222266; box-shadow: 0 0 22px #cc222214; }
    .card.rank-1 {
      border-color: #ffd700 !important; border-width: 3px;
      background: linear-gradient(160deg, #131000 0%, #1c1700 50%, #080800 100%) !important;
      animation: pulse-gold 1.6s ease-in-out infinite;
    }
    .card.rank-2 {
      border-color: #d0d0d0 !important; border-width: 2px;
      background: linear-gradient(160deg, #111111 0%, #181818 50%, #0d0d0d 100%) !important;
      animation: pulse-silver 2s ease-in-out infinite;
    }
    .card.rank-3 {
      border-color: #cd7f32cc !important; border-width: 2px;
      background: linear-gradient(160deg, #110800 0%, #1a0e00 50%, #0d0800 100%) !important;
      animation: pulse-bronze 2.2s ease-in-out infinite;
    }
    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 30px #ffd700bb, 0 0 70px #ffd70055, inset 0 0 30px #ffd70008; }
      50%     { box-shadow: 0 0 70px #ffd700ff, 0 0 140px #ffd700aa, 0 0 220px #ffd70044, inset 0 0 50px #ffd70014; }
    }
    @keyframes pulse-silver {
      0%,100% { box-shadow: 0 0 20px #c0c0c066, 0 0 50px #c0c0c022, inset 0 0 20px #c0c0c006; }
      50%      { box-shadow: 0 0 45px #c0c0c0bb, 0 0 90px #c0c0c055, inset 0 0 35px #c0c0c010; }
    }
    @keyframes pulse-bronze {
      0%,100% { box-shadow: 0 0 8px #cd7f3233, 0 0 18px #cd7f3211; }
      50%      { box-shadow: 0 0 18px #cd7f3255, 0 0 35px #cd7f3222; }
    }

    /* ── Card top ── */
    .card-top {
      display: flex; flex-direction: row; align-items: center;
      padding: 4px 8px 4px 8px; gap: 8px; flex-shrink: 0;
      border-bottom: 1px solid #0a2e2a;
    }
    .card-id { display: flex; flex-direction: column; align-items: center; justify-content: center;
               min-width: 60px; flex-shrink: 0; gap: 0; }
    .id-medal { font-size: 1.6rem; line-height: 1; filter: drop-shadow(0 0 8px rgba(255,220,50,0.9)); }
    .id-medal.oro     { filter: drop-shadow(0 0 12px #ffd70099) drop-shadow(0 0 24px #ffaa0066); }
    .id-medal.plata   { filter: drop-shadow(0 0 10px #c0c0c099) drop-shadow(0 0 20px #a0a0a055); }
    .id-medal.bronce  { filter: drop-shadow(0 0 10px #cd7f3299) drop-shadow(0 0 20px #a0500055); }
    .id-linea { font-size: 2.6rem; font-weight: 900; line-height: 1; letter-spacing: -2px; }
    .id-linea.verde    { color: #00c8b8; text-shadow: 0 0 28px #00c8b8cc, 0 0 50px #00c8b866; }
    .id-linea.amarillo { color: #ff8c00; text-shadow: 0 0 20px #ff8c0066; }
    .id-linea.rojo     { color: #ff5555; text-shadow: 0 0 20px #ff555566; }
    .id-linea.gris     { color: #00c8b8; text-shadow: 0 0 16px #00c8b866; }
    .id-modelo { font-size: 0.48rem; color: #00856e; letter-spacing: 1px;
                 text-transform: uppercase; }
    .card-kpis { flex: 1; display: flex; flex-direction: column; gap: 4px; justify-content: center; }

    /* ── Barras KPI ── */
    .kpi-row { display: flex; align-items: stretch; }
    .kpi-track {
      flex: 1; height: 30px; background: #071a17; border-radius: 15px;
      position: relative; overflow: visible;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
    }
    .kpi-track::before {
      content: ''; position: absolute; inset: 0; border-radius: 19px;
      background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, transparent 60%);
    }
    .kpi-fill {
      height: 100%; border-radius: 19px; min-width: 8px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
      position: relative; overflow: hidden;
    }
    .kpi-fill::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 42%; border-radius: 19px 19px 0 0; background: rgba(255,255,255,0.18);
    }
    .kpi-fill::after {
      content: ''; position: absolute; right: -2px; top: 15%; bottom: 15%;
      width: 22px; border-radius: 50%;
      background: radial-gradient(ellipse at right, rgba(255,255,255,0.55), transparent 70%);
    }
    .kpi-fill.verde    { background: linear-gradient(90deg, #003d2a 0%, #00877a 55%, #00c8b8 100%);
                         box-shadow: 0 0 20px #00877a55, 0 2px 8px rgba(0,0,0,0.5); }
    .kpi-fill.amarillo { background: linear-gradient(90deg, #5c2800 0%, #d46000 60%, #ff8c00 100%);
                         box-shadow: 0 0 16px #ff8c0044; }
    .kpi-fill.rojo     { background: linear-gradient(90deg, #550000 0%, #cc2020 60%, #ff4545 100%);
                         animation: pulso-rojo 2s ease-in-out infinite; }
    .kpi-fill.azul     { background: linear-gradient(90deg, #003a2a 0%, #00877a 55%, #00c8b8 100%);
                         box-shadow: 0 0 16px #00877a44; }
    @keyframes pulso-rojo { 0%,100%{filter:brightness(0.85);} 50%{filter:brightness(1.1);} }
    .kpi-inner-label {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-size: 0.68rem; font-weight: 800; letter-spacing: 2.5px;
      text-transform: uppercase; color: rgba(255,255,255,0.88); z-index: 3;
      text-shadow: 0 1px 5px rgba(0,0,0,0.9);
      pointer-events: none;
    }
    .kpi-fill-val {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      display: flex; align-items: baseline; gap: 4px; z-index: 3; white-space: nowrap;
    }
    .kpi-fill-num { font-size: 1.1rem; font-weight: 900; font-variant-numeric: tabular-nums;
                    color: #ffffff; text-shadow: 0 0 10px rgba(0,0,0,1), 0 1px 6px rgba(0,0,0,0.9); }
    .kpi-fill-pct { font-size: 0.82rem; font-weight: 900; }
    .kpi-fill-pct.verde    { color: #69f0ae; text-shadow: 0 0 8px #69f0ae88; }
    .kpi-fill-pct.amarillo { color: #ffcc80; text-shadow: 0 0 8px #ffcc8088; }
    .kpi-fill-pct.rojo     { color: #ff8a80; text-shadow: 0 0 8px #ff8a8088; }
    .kpi-fill-pct.azul     { color: #80deea; text-shadow: 0 0 8px #80deea88; }
    .kpi-sep { color: rgba(255,255,255,0.35); font-size: 0.9rem; margin: 0 3px; }
    .kpi-meta { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.6);
                font-variant-numeric: tabular-nums; }
    .kpi-avg-line {
      position: absolute; top: -5px; bottom: -5px; width: 2px;
      background: rgba(255,255,255,0.5); border-radius: 2px; z-index: 6;
      box-shadow: 0 0 6px rgba(255,255,255,0.4);
    }
    .kpi-avg-label {
      position: absolute; top: -16px; transform: translateX(-50%);
      font-size: 0.42rem; font-weight: 700; color: rgba(255,255,255,0.5);
      white-space: nowrap; letter-spacing: 0.5px;
    }
    .kpi-target-end {
      position: absolute; right: 0; top: -6px; bottom: -6px; width: 2px;
      background: rgba(255,255,255,0.3); border-radius: 2px; z-index: 5;
    }
    .kpi-target-end-label { display: none; }

    /* ── Operadores — zona scrollable ── */
    .card-ops {
      flex: 1; min-height: 0; overflow: hidden;
      display: flex; flex-direction: row; align-items: stretch;
      padding: 8px 10px; gap: 7px;
    }
    .card-ops.vacia { align-items: center; justify-content: center; }
    .ops-empty { color: #0a3530; font-size: 0.75rem; }

    /* ── Mini scoreboard por línea ── */
    .card-scoreboard {
      flex-shrink: 0; padding: 5px 10px 8px; display: flex; flex-direction: column; gap: 4px;
      border-top: 1px solid #0a2e2a;
    }
    .csb-title { font-size: 0.45rem; font-weight: 700; letter-spacing: 2px; color: #00856e;
                 text-transform: uppercase; margin-bottom: 2px; }
    .csb-row { display: flex; align-items: center; gap: 6px; }
    .csb-pos  { font-size: 0.9rem; width: 18px; text-align: center; flex-shrink: 0; }
    .csb-avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover;
                  flex-shrink: 0; border: 1px solid #0a2e2a; }
    .csb-avatar-ini { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #0a2e2a;
                      background: #071a17; display: flex; align-items: center; justify-content: center;
                      font-size: 0.45rem; font-weight: 800; color: #00c8b8; flex-shrink: 0; }
    .csb-nombre { flex: 1; font-size: 0.58rem; font-weight: 700; color: #b2dfdb;
                  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .csb-row.csb-1 .csb-nombre { color: #ffd700; }
    .csb-row.csb-2 .csb-nombre { color: #d0d0d0; }
    .csb-bar-wrap { width: 50px; height: 5px; background: #071a17; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .csb-bar-fill { height: 100%; border-radius: 3px; transition: width 1s; }
    .csb-bar-fill.verde    { background: linear-gradient(90deg, #003d2a, #00c8b8); }
    .csb-bar-fill.amarillo { background: linear-gradient(90deg, #5c2000, #ff8c00); }
    .csb-bar-fill.rojo     { background: linear-gradient(90deg, #550000, #ff4545); }
    .csb-uph { font-size: 0.65rem; font-weight: 900; min-width: 28px; text-align: right;
               font-variant-numeric: tabular-nums; color: #00c8b8; flex-shrink: 0; }
    .csb-row.csb-1 .csb-uph { color: #ffd700; }
    .csb-row.csb-2 .csb-uph { color: #d0d0d0; }

    /* ── Mini-card por operador (Opción B) ── */
    .op-card {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; min-width: 0; gap: 5px;
      background: #040f0e;
      border-radius: 12px;
      border: 1px solid #0d2e29;
      padding: 10px 8px 8px;
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .op-card.kpi-verde {
      border-color: #00c8b8cc;
      box-shadow: 0 0 22px #00c8b844, inset 0 0 18px #00c8b808;
      background: linear-gradient(160deg, #061f1c 0%, #04130f 100%);
    }
    .op-card.kpi-amarillo { border-color: #ff880066; box-shadow: 0 0 12px #ff880018; }
    .op-card.kpi-rojo     { border-color: #ff404066; box-shadow: 0 0 12px #ff404018; }

    /* Avatar dentro de la mini-card */
    .op-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
                 flex-shrink: 0; border: 2px solid #0a2e2a; }
    .op-avatar.kpi-verde    { border-color: #00c8b8; border-width: 3px;
                              box-shadow: 0 0 16px #00c8b877, 0 0 32px #00c8b833; }
    .op-avatar.kpi-amarillo { border-color: #ff8800aa; }
    .op-avatar.kpi-rojo     { border-color: #ff4040aa; }
    .op-avatar-ini { width: 48px; height: 48px; border-radius: 50%;
                     border: 2px solid #0a2e2a; background: #071a17;
                     display: flex; align-items: center; justify-content: center;
                     font-size: 0.75rem; font-weight: 800; color: #00c8b8; flex-shrink: 0; }
    .op-card.kpi-verde .op-avatar-ini {
      border-color: #00c8b8; border-width: 3px;
      box-shadow: 0 0 16px #00c8b877;
    }
    .op-name { font-size: 0.58rem; font-weight: 700; color: #7ecdc4; text-align: center;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
               letter-spacing: 0.5px; }
    .op-card.kpi-verde .op-name { color: #00e5cc; text-shadow: 0 0 8px #00c8b866; }

    /* Barras de estaciones dentro de la card */
    .op-stations { display: flex; flex-direction: row; gap: 6px;
                   align-items: stretch; flex: 1; min-height: 0;
                   width: 100%; justify-content: center; }
    .st-col { display: flex; flex-direction: column; align-items: center;
              gap: 3px; width: 30px; }
    .st-bar-outer { flex: 1; min-height: 60px; display: flex;
                    flex-direction: column; align-items: center; justify-content: flex-end; }
    .st-bar-wrap { width: 22px; position: relative; background: #071a17;
                   border-radius: 6px; overflow: visible; }
    .st-bar-fill { width: 100%; border-radius: 6px; min-height: 3px; transition: height 0.9s cubic-bezier(.4,0,.2,1); }
    .st-bar-fill.verde    { background: linear-gradient(0deg, #003d2a, #00877a, #00e5cc);
                            box-shadow: 0 0 12px #00c8b855, 0 0 4px #00e5ccaa; }
    .st-bar-fill.amarillo { background: linear-gradient(0deg, #5c2000, #cc5500, #ff8800); }
    .st-bar-fill.rojo     { background: linear-gradient(0deg, #550000, #bb1111, #ff4040);
                            animation: pulso-rojo 2s ease-in-out infinite; }
    .st-bar-fill.gris     { background: #1a3a35; }
    .st-target-line {
      position: absolute; left: -4px; right: -4px; height: 2px;
      background: rgba(255,255,255,0.6); border-radius: 1px; z-index: 2;
      box-shadow: 0 0 5px rgba(255,255,255,0.35);
    }
    .st-val   { font-size: 0.62rem; font-weight: 900; font-variant-numeric: tabular-nums;
                color: #e0f7f5; line-height: 1; }
    .st-pct   { font-size: 0.5rem; font-weight: 700; line-height: 1; }
    .st-pct.verde    { color: #00c8b8; }
    .st-pct.amarillo { color: #ff8800; }
    .st-pct.rojo     { color: #ff4040; }
    .st-pct.gris     { color: #1a5048; }
    .st-label { font-size: 0.62rem; color: #1a7060; font-weight: 700; letter-spacing: 0.5px; }

    /* ─── SIDEBAR ────────────────────────────────────── */
    .sidebar { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
    .sb-hero {
      flex-shrink: 0; border-radius: 14px; padding: 14px 14px 10px;
      background: linear-gradient(135deg, #061412 0%, #071e0e 50%, #061412 100%);
      border: 1px solid #0a2e2a; position: relative;
    }
    .sb-hero-glow { position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
                    width: 160px; height: 100px; border-radius: 50%;
                    background: radial-gradient(ellipse, #00c8b820, transparent 70%); }
    .sb-turno-label { font-size: 0.48rem; font-weight: 700; letter-spacing: 3px;
                      color: #00856e; text-transform: uppercase; }
    .sb-turno-val   { font-size: 1.4rem; font-weight: 900; color: #00c8b8;
                      text-shadow: 0 0 20px #00c8b855; letter-spacing: 2px; }
    .sb-turno-hora  { font-size: 0.55rem; color: #00856e; margin-top: 2px; }
    .sb-hero-bottom {
      display: flex; align-items: center; justify-content: center; gap: 5px; padding: 4px 0 2px;
      white-space: nowrap; flex-wrap: nowrap;
    }
    .sb-trophy { font-size: 1.3rem; filter: drop-shadow(0 0 6px #ffd70099); flex-shrink: 0; }
    .sb-ranking-label { font-size: 0.78rem; font-weight: 800; letter-spacing: 1.5px;
                        text-transform: uppercase; color: #00c8b8; text-shadow: 0 0 10px #00c8b877; }
    .sb-hero-sep { color: #00856e; font-size: 0.78rem; }
    .sb-turno-badge {
      font-size: 0.78rem; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; color: #00c8b8;
      text-shadow: 0 0 10px #00c8b877;
    }
    .sb-monito-wrap {
      display: flex; justify-content: center; align-items: center; padding: 4px 0 2px;
      position: relative;
    }
    .sb-monito-wrap::before, .sb-monito-wrap::after {
      content: '';
      position: absolute;
      top: 10%; bottom: 10%;
      width: 18px; border-radius: 50%;
      background: #00c8b8;
      filter: blur(14px);
      opacity: 0.75;
      animation: glow-pulse 2.5s ease-in-out infinite;
    }
    .sb-monito-wrap::before { left: 0; }
    .sb-monito-wrap::after  { right: 0; }
    @keyframes glow-pulse {
      0%,100% { opacity: 0.55; filter: blur(14px); }
      50%      { opacity: 1;    filter: blur(20px); }
    }
    .sb-monito { width: 100%; max-height: 160px; object-fit: contain; display: block; position: relative; z-index: 1; }
    .sb-sec-title   { font-size: 0.48rem; font-weight: 700; letter-spacing: 2px;
                      color: #00856e; text-transform: uppercase; margin-bottom: 5px; padding: 0 2px; }
    .sb-ranking {
      flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
      scrollbar-width: thin; scrollbar-color: #0a2e2a transparent;
    }
    .sb-ranking::-webkit-scrollbar { width: 3px; }
    .sb-ranking::-webkit-scrollbar-thumb { background: #0a2e2a; }
    .rk-card { background: #061412; border: 1px solid #0a2e2a;
               border-radius: 10px; padding: 6px 8px; flex-shrink: 0; transition: border-color 0.4s; }
    .rk-card.rk-1 { border-color: #ffd700aa; background: #0a0e00; animation: pulse-gold 2s ease-in-out infinite; }
    .rk-card.rk-2 { border-color: #c0c0c077; background: #080e0a; }
    .rk-card.rk-3 { border-color: #cd7f3255; }
    .rk-card.rk-verde    { border-color: #00877a44; }
    .rk-card.rk-amarillo { border-color: #cc770033; }
    .rk-card.rk-rojo     { border-color: #cc222233; }
    .rk-top    { display: flex; align-items: center; gap: 6px; }
    .rk-medal  { font-size: 1rem; width: 18px; text-align: center; flex-shrink: 0; }
    .rk-rank   { font-size: 0.65rem; font-weight: 700; color: #00856e; width: 14px; text-align: center; flex-shrink: 0; }
    .rk-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid #0a2e2a; }
    .rk-avatar-ini { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #0a2e2a;
                     background: #061412; display: flex; align-items: center; justify-content: center;
                     font-size: 0.55rem; font-weight: 700; color: #00c8b8; flex-shrink: 0; }
    .rk-info   { flex: 1; min-width: 0; }
    .rk-nombre { font-size: 0.68rem; font-weight: 700; color: #b2dfdb;
                 white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rk-1 .rk-nombre { color: #ffd700; }
    .rk-2 .rk-nombre { color: #d0d0d0; }
    .rk-sub    { font-size: 0.52rem; color: #00856e; }
    .rk-right  { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
    .rk-val    { font-size: 0.95rem; font-weight: 900; font-variant-numeric: tabular-nums; }
    .rk-val.verde    { color: #00c8b8; }
    .rk-val.amarillo { color: #ff8800; }
    .rk-val.rojo     { color: #ff4040; }
    .rk-1 .rk-val   { color: #ffd700; }
    .rk-pct  { font-size: 0.5rem; font-weight: 700; }
    .rk-pct.verde { color: #00c8b8; } .rk-pct.amarillo { color: #ff8800; } .rk-pct.rojo { color: #ff4040; }
    .rk-bar-wrap { width: 100%; height: 3px; background: #071a17; border-radius: 2px; overflow: hidden; margin-top: 5px; }
    .rk-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s; }
    .rk-bar-fill.verde    { background: linear-gradient(90deg, #003d2a, #00c8b8); }
    .rk-bar-fill.amarillo { background: linear-gradient(90deg, #5c2000, #ff8800); }
    .rk-bar-fill.rojo     { background: linear-gradient(90deg, #550000, #ff4040); }
    .rk-1 .rk-bar-fill    { background: linear-gradient(90deg, #8a6000, #ffd700); }

    /* ─── MODAL PASSWORD ─────────────────────────────── */
    .pwd-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(4,15,14,0.88); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .pwd-overlay.visible { opacity: 1; pointer-events: all; }
    .pwd-box {
      background: #061412; border: 1px solid #0a2e2a;
      border-radius: 20px; padding: 32px 36px; display: flex;
      flex-direction: column; align-items: center; gap: 16px;
      box-shadow: 0 0 60px #ffd70022;
      animation: pwd-drop 0.3s cubic-bezier(.36,1.6,.4,1);
    }
    @keyframes pwd-drop {
      0%   { transform: scale(0.8) translateY(-20px); opacity: 0; }
      100% { transform: scale(1) translateY(0);       opacity: 1; }
    }
    .pwd-icon  { font-size: 2.8rem; filter: drop-shadow(0 0 16px #ffd70099); }
    .pwd-title { font-size: 0.72rem; font-weight: 800; letter-spacing: 3px;
                 text-transform: uppercase; color: #00856e; }
    .pwd-input {
      background: #071a17; border: 1px solid #0a2e2a; border-radius: 10px;
      padding: 10px 18px; color: #e0f7f5; font-size: 1.1rem; font-weight: 700;
      letter-spacing: 6px; text-align: center; outline: none; width: 180px;
      transition: border-color 0.3s;
    }
    .pwd-input:focus { border-color: #00c8b8; box-shadow: 0 0 12px #00c8b833; }
    .pwd-input.err   { border-color: #ff4040; animation: pwd-shake 0.3s; }
    @keyframes pwd-shake {
      0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-8px); } 75%{ transform:translateX(8px); }
    }
    .pwd-btn {
      padding: 10px 32px; border-radius: 20px; font-size: 0.72rem; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      background: #00877a; border: none; color: #fff;
      box-shadow: 0 0 20px #00877a55; transition: all 0.2s;
    }
    .pwd-btn:hover { background: #00c8b8; box-shadow: 0 0 28px #00c8b877; }
    .pwd-err { font-size: 0.62rem; color: #ff6060; letter-spacing: 1px; min-height: 14px; }

    /* ─── FOOTER ─────────────────────────────────────── */
    footer { display: none; }
    .ft-dot { display: none; }
  </style>
</head>
<body>

<header>
  <div class="h-logo-wrap">
    <div class="h-title">
      <div class="h-live-dot" id="h-live-dot"></div>
      <div>
        <div class="h-live-text">EN VIVO · Dashboard UPH</div>
        <div class="h-live-sub">Producción en tiempo real</div>
      </div>
    </div>
  </div>
  <div class="h-center">
    <span class="h-logo">Hisense</span>
    <div class="h-sep"></div>
    <span class="h-empresa">Electrónica de México S.A. de C.V.</span>
  </div>
  <div class="h-right">
    <div class="h-turnos">
      <span class="t-pill" id="pill-A">Turno A</span>
      <span class="t-pill" id="pill-B">Turno B</span>
      <span class="t-pill" id="pill-C">Turno C</span>
    </div>
    <div class="h-clock" id="clock">--:--:--</div>
    <a href="/uph-tendencias.html" class="h-tendencias" title="Tendencias UPH por hora">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="7" fill="#00c8b811"/>
        <polyline points="4,22 10,15 15,17 24,6" stroke="#00e5cc" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
        <polyline points="19,6 24,6 24,11" stroke="#00e5cc" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
        <circle cx="10" cy="15" r="1.8" fill="#00e5cc"/>
        <circle cx="15" cy="17" r="1.8" fill="#00e5cc"/>
        <circle cx="24" cy="6" r="1.8" fill="#00e5cc"/>
      </svg>
    </a>
    <a href="#" class="h-monitor" title="Ver ranking semanal · Bono semanal" onclick="abrirRanking(event)">
      💰
    </a>
  </div>
</header>

<div class="main">
  <div class="lines-grid" id="lines"></div>
  <aside class="sidebar">
    <div class="sb-hero">
      <div class="sb-hero-glow"></div>
      <div class="sb-monito-wrap">
        <img src="/monito.jpg" class="sb-monito" alt="monito">
      </div>
      <div class="sb-hero-bottom">
        <span class="sb-trophy">🏆</span>
        <span class="sb-ranking-label">Ranking</span>
        <span class="sb-hero-sep">·</span>
        <div class="sb-turno-badge" id="sb-turno-badge">—</div>
      </div>
    </div>
    <div class="sb-ranking" id="sb-ranking"></div>
  </aside>
</div>

<div class="pwd-overlay" id="pwd-overlay" onclick="cerrarPwdSiAfuera(event)">
  <div class="pwd-box" id="pwd-box">
    <div class="pwd-icon">💰</div>
    <div class="pwd-title">Acceso restringido</div>
    <input class="pwd-input" id="pwd-input" type="password" placeholder="••••••"
      maxlength="20" autocomplete="off"
      onkeydown="if(event.key==='Enter')verificarPwd(); if(event.key==='Escape')cerrarPwd();">
    <div class="pwd-err" id="pwd-err"></div>
    <button class="pwd-btn" onclick="verificarPwd()">Entrar</button>
  </div>
</div>

<footer>
  <span><span class="ft-dot" id="ft-dot"></span>Hisense AMI · Dashboard UPH</span>
  <span id="last-upd">conectando…</span>
  <span>UPH = piezas/hora · actualiza cada 15s</span>
</footer>

<script>
  const API       = `${window.location.protocol}//${window.location.hostname}:${window.location.port}`;

  // ── Modal contraseña ──────────────────────────────────────────
  function abrirRanking(e) {
    e.preventDefault();
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-err').textContent = '';
    document.getElementById('pwd-input').classList.remove('err');
    document.getElementById('pwd-overlay').classList.add('visible');
    setTimeout(() => document.getElementById('pwd-input').focus(), 50);
  }
  function cerrarPwd() {
    document.getElementById('pwd-overlay').classList.remove('visible');
  }
  function cerrarPwdSiAfuera(e) {
    if (e.target === document.getElementById('pwd-overlay')) cerrarPwd();
  }
  function verificarPwd() {
    const val = document.getElementById('pwd-input').value;
    if (val === 'admin') {
      cerrarPwd();
      window.location.href = '/ranking-semanal.html';
    } else {
      const inp = document.getElementById('pwd-input');
      inp.classList.add('err');
      document.getElementById('pwd-err').textContent = 'Contraseña incorrecta';
      inp.value = '';
      setTimeout(() => inp.classList.remove('err'), 400);
    }
  }
  const ST_MAX    = 110;

  function col(pct) {
    if (pct == null) return 'gris';
    return pct >= 100 ? 'verde' : pct >= 90 ? 'amarillo' : 'rojo';
  }
  function ini(nombre) {
    return (nombre||'?').trim().split(' ').slice(0,2).map(p=>p[0]||'').join('').toUpperCase();
  }

  // ── Avatars ──────────────────────────────────────────────────
  function avatarHTML(op, kpiClass) {
    const src = op.foto_url ? (op.foto_url.startsWith('http') ? op.foto_url : `${API}${op.foto_url}`) : '';
    if (src) return `<img class="op-avatar kpi-${kpiClass}" src="${src}" alt="${ini(op.nombre)}"
      onerror="this.outerHTML=\`<div class='op-avatar-ini'>${ini(op.nombre)}</div>\`">`;
    return `<div class="op-avatar-ini">${ini(op.nombre)}</div>`;
  }
  function rkAvatarHTML(op) {
    const src = op.foto_url ? (op.foto_url.startsWith('http') ? op.foto_url : `${API}${op.foto_url}`) : '';
    if (src) return `<img class="rk-avatar" src="${src}" alt="${ini(op.nombre)}"
      onerror="this.outerHTML=\`<div class='rk-avatar-ini'>${ini(op.nombre)}</div>\`">`;
    return `<div class="rk-avatar-ini">${ini(op.nombre)}</div>`;
  }

  // ── Barra KPI ────────────────────────────────────────────────
  function kpiRowHTML(label, actual, meta, clase) {
    const fillPct = meta > 0 ? Math.min(actual / meta / 1.25 * 100, 100).toFixed(1) : '0';
    const pct     = meta > 0 ? Math.round(actual / meta * 100) : null;
    // Línea de promedio al 80% del ancho de la meta (referencia visual)
    const avgPct  = meta > 0 ? (1 / 1.25 * 100).toFixed(1) : null;
    return `
      <div class="kpi-row">
        <div class="kpi-track">
          <span class="kpi-inner-label">${label}</span>
          <div class="kpi-fill ${clase}" style="width:${fillPct}%"></div>
          ${avgPct ? `<div class="kpi-avg-line" style="left:${avgPct}%"></div>` : ''}
          <div class="kpi-fill-val">
            ${pct != null ? `<span class="kpi-fill-pct ${clase}">${pct}%</span>` : ''}
            <span class="kpi-sep">|</span>
            <span class="kpi-fill-num">${actual.toLocaleString()}${meta > 0 ? `<span class="kpi-meta">/${meta.toLocaleString()}</span>` : ''}</span>
          </div>
        </div>
      </div>`;
  }

  // ── Estación ─────────────────────────────────────────────────
  function stColHTML(st) {
    const kpi     = st.uph_meta > 0 ? Math.round(st.uph_hora / st.uph_meta * 100) : null;
    const c       = col(kpi);
    const fillPct = st.uph_meta > 0 ? Math.min(st.uph_hora / st.uph_meta / (ST_MAX/100) * 100, 100).toFixed(1) : 0;
    const tBot    = st.uph_meta > 0 ? (100 / ST_MAX * 100).toFixed(1) : null;
    return `
      <div class="st-col">
        <span class="st-val">${Math.round(st.uph_hora)}</span>
        <span class="st-pct ${c}">${kpi != null ? kpi+'%' : '—'}</span>
        <div class="st-bar-outer">
          <div class="st-bar-wrap" style="width:26px;height:100%;min-height:40px">
            ${tBot ? `<div class="st-target-line" style="bottom:${tBot}%"></div>` : ''}
            <div style="position:absolute;bottom:0;left:0;right:0;border-radius:6px;overflow:hidden;height:${fillPct}%">
              <div class="st-bar-fill ${c}" style="height:100%"></div>
            </div>
          </div>
        </div>
        <span class="st-label">${(st.estacion||'—').replace(/^E/i,'')}</span>
      </div>`;
  }

  // ── Operador ─────────────────────────────────────────────────
  function opColHTML(op) {
    const nombre2 = (op.nombre||'').split(' ').slice(0,2).join(' ');
    const ests    = op.estaciones||[];
    const best    = ests.reduce((b,s)=>s.uph_hora>b?s.uph_hora:b, 0);
    const meta    = ests[0]?.uph_meta||0;
    const c       = col(meta > 0 ? Math.round(best/meta*100) : null);
    return `
      <div class="op-card kpi-${c}">
        ${avatarHTML(op, c)}
        <span class="op-name">${nombre2}</span>
        <div class="op-stations">${ests.map(stColHTML).join('')}</div>
      </div>`;
  }

  function miniScoreHTML(operadores) {
    if (!operadores || operadores.length === 0) return '';
    const ranked = [...operadores].map(op => {
      const ests = op.estaciones||[];
      const best = ests.reduce((b,s) => s.uph_hora > b ? s.uph_hora : b, 0);
      const meta = ests[0]?.uph_meta||0;
      return { ...op, uph: Math.round(best), meta };
    }).sort((a,b) => b.uph - a.uph).slice(0, 3);

    const maxUph = ranked[0]?.uph || 1;
    const medals = ['🥇','🥈','🥉'];
    const clsMap = ['csb-1','csb-2','csb-3'];

    return `
      <div class="card-scoreboard">
        <div class="csb-title">⚡ Top operadores</div>
        ${ranked.map((op, i) => {
          const nombre2 = (op.nombre||'').split(' ').slice(0,2).join(' ');
          const pct = op.meta > 0 ? Math.round(op.uph/op.meta*100) : null;
          const c = col(pct);
          const src = op.foto_url ? (op.foto_url.startsWith('http') ? op.foto_url : `${API}${op.foto_url}`) : '';
          const avatar = src
            ? `<img class="csb-avatar" src="${src}" onerror="this.outerHTML='<div class=\\'csb-avatar-ini\\'>${ini(op.nombre)}</div>'">`
            : `<div class="csb-avatar-ini">${ini(op.nombre)}</div>`;
          return `
            <div class="csb-row ${clsMap[i]}">
              <span class="csb-pos">${medals[i]}</span>
              ${avatar}
              <span class="csb-nombre">${nombre2}</span>
              <div class="csb-bar-wrap"><div class="csb-bar-fill ${c}" style="width:${Math.round(op.uph/maxUph*100)}%"></div></div>
              <span class="csb-uph">${op.uph}</span>
            </div>`;
        }).join('')}
      </div>`;
  }

  function lineaLabel(l) {
    return (l||'').replace(/^HI-?/i, 'L');
  }

  // ── Card ─────────────────────────────────────────────────────
  function cardHTML(linea, rankMap) {
    const uphPct  = linea.uph_meta > 0 ? Math.round(linea.uph_actual/linea.uph_meta*100) : null;
    const uphCol  = col(uphPct);
    const rank    = rankMap[linea.linea]||99;
    const rankCls = rank<=3 ? `rank-${rank}` : '';
    const medalEmoji = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
    const medalClass = rank===1?'oro':rank===2?'plata':rank===3?'bronce':'';
    const medal = medalEmoji;
    const ops     = (linea.operadores||[]).map(opColHTML).join('');
    const opsSection = linea.operadores.length > 0
      ? `<div class="card-ops">${ops}</div>`
      : `<div class="card-ops vacia"><span class="ops-empty">Sin operadores asignados</span></div>`;
    return `
      <div class="card ${uphCol} ${rankCls}">
        <div class="card-top">
          <div class="card-id">
            ${medal ? `<span class="id-medal ${medalClass}">${medal}</span>` : ''}
            <span class="id-linea ${uphCol}">${lineaLabel(linea.linea)}</span>
            <span class="id-modelo">${linea.modelo||'—'}</span>
          </div>
          <div class="card-kpis">
            ${kpiRowHTML('UPH',    linea.uph_actual,    linea.uph_meta,    uphCol)}
            ${kpiRowHTML('Modelo', linea.piezas_modelo, linea.plan_modelo, 'azul')}
          </div>
        </div>

        ${opsSection}
      </div>`;
  }

  // ── Render ───────────────────────────────────────────────────
  function render(lineas) {
    const sorted = [...lineas].map(l=>({linea:l.linea, pct:l.uph_meta>0?l.uph_actual/l.uph_meta:0})).sort((a,b)=>b.pct-a.pct);
    const rankMap = {};
    sorted.forEach((l,i)=>{ rankMap[l.linea]=i+1; });
    document.getElementById('lines').innerHTML = lineas.map(l=>cardHTML(l,rankMap)).join('');
  }

  function renderSidebar(lineas, turno_activo) {
    const turnoNombre = turno_activo === 1 ? 'A' : turno_activo === 2 ? 'B' : 'C';
    const turnoHora   = {1:'06:30–18:30 · Lun–Jue', 2:'18:30–06:30 · Lun–Vie', 3:'06:30–18:30 · Vie–Dom'}[turno_activo] || '—';
    document.getElementById('sb-turno-badge').textContent = `Turno ${turnoNombre}`;
    document.getElementById('sb-turno-badge').textContent = `Turno ${turnoNombre}`;
    ['A','B','C'].forEach(x => {
      const el = document.getElementById(`pill-${x}`);
      if (el) el.className = `t-pill${x===turnoNombre?' act-'+x:''}`;
    });

    const ops = [];
    lineas.forEach(linea => {
      (linea.operadores||[]).forEach(op => {
        const ests = op.estaciones||[];
        const best = ests.reduce((b,s)=>s.uph_hora>b?s.uph_hora:b, 0);
        const meta = ests[0]?.uph_meta||0;
        const kpi  = meta>0 ? Math.round(best/meta*100) : null;
        ops.push({...op, linea:linea.linea, modelo:linea.modelo, uph:Math.round(best), meta, kpi});
      });
    });
    ops.sort((a,b)=>b.uph-a.uph);
    const maxUph = ops[0]?.uph||1;

    document.getElementById('sb-ranking').innerHTML = ops.slice(0,12).map((op,i) => {
      const rank=i+1, medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':null;
      const c=col(op.kpi), bordCls=rank<=3?`rk-${rank}`:`rk-${c}`;
      const nombre2=(op.nombre||'').split(' ').slice(0,2).join(' ');
      return `
        <div class="rk-card ${bordCls}">
          <div class="rk-top">
            ${medal?`<span class="rk-medal">${medal}</span>`:`<span class="rk-rank">${rank}</span>`}
            ${rkAvatarHTML(op)}
            <div class="rk-info">
              <div class="rk-nombre">${nombre2}</div>
              <div class="rk-sub">${op.linea} · ${op.modelo||'—'}</div>
            </div>
            <div class="rk-right">
              <span class="rk-val ${rank<=3?'':c}">${op.uph}</span>
              ${op.kpi!=null?`<span class="rk-pct ${c}">${op.kpi}%</span>`:''}
            </div>
          </div>
          <div class="rk-bar-wrap"><div class="rk-bar-fill ${rank===1?'':c}" style="width:${Math.round(op.uph/maxUph*100)}%"></div></div>
        </div>`;
    }).join('');

  }

  // ── Fetch ────────────────────────────────────────────────────
  async function fetchData() {
    const dot = document.getElementById('ft-dot');
    const liveDot = document.getElementById('h-live-dot');
    try {
      const res  = await fetch('/api/uph/dashboard/lineas-hoy');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const lineas = data.lineas||[];
      if (data.fuera_horario) {
        document.getElementById('lines').innerHTML =
          `<div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;">
            <span style="font-size:2.5rem;opacity:0.3">🌙</span>
            <span style="color:#0a3530;font-size:1.1rem;font-weight:700;letter-spacing:2px;">FUERA DE HORARIO</span>
            <span style="color:#071a17;font-size:0.75rem;">Sáb 18:30–Dom 06:30 · Dom 18:30–Lun 06:30 sin operaciones</span>
          </div>`;
        document.getElementById('sb-turno-badge').textContent = '—';
        document.getElementById('sb-ranking-title').textContent = '🏆 Ranking · Turno —';
        document.getElementById('sb-ranking').innerHTML      = '';
      } else if (lineas.length > 0) {
        render(lineas);
        renderSidebar(lineas, data.turno_activo);
      } else {
        document.getElementById('lines').innerHTML =
          `<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;color:#00856e;font-size:1rem;">Sin datos · asigna operadores para comenzar</div>`;
      }
      dot.className = 'ft-dot';
      liveDot.className = 'h-live-dot';
      document.getElementById('last-upd').textContent = `Actualizado: ${new Date().toLocaleTimeString('es-MX')}`;
    } catch(e) {
      dot.className = 'ft-dot err';
      liveDot.className = 'h-live-dot err';
      document.getElementById('last-upd').textContent = `Sin conexión · ${e.message}`;
    }
  }

  // ── WebSocket — refresco en tiempo real ──────────────────────
  let wsRetryMs = 2000;
  function connectWS() {
    const wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl   = `${wsProto}//${window.location.hostname}:${window.location.port}/api/uph/ws`;
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      console.log('[WS] conectado');
      wsRetryMs = 2000;
      document.getElementById('last-upd').textContent = '⚡ Tiempo real conectado';
    };
    ws.onmessage = (e) => {
      if (e.data === 'refresh') fetchData();
    };
    ws.onclose = () => {
      console.warn(`[WS] desconectado, reintentando en ${wsRetryMs}ms`);
      setTimeout(connectWS, wsRetryMs);
      wsRetryMs = Math.min(wsRetryMs * 2, 30000);
    };
    ws.onerror = () => ws.close();

    // Ping cada 25s para mantener viva la conexión
    setInterval(() => { if (ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 25000);
  }

  // ── Reloj ────────────────────────────────────────────────────
  function tick() {
    const now = new Date(), pad = n => String(n).padStart(2,'0');
    document.getElementById('clock').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }

  tick(); setInterval(tick, 1000);
  fetchData();            // carga inicial
  connectWS();            // tiempo real vía WebSocket
  setInterval(fetchData, 60000); // fallback cada 60s por si el WS falla
</script>
</body>
</html>
