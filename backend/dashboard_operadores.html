<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operadores — Hisense AMI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #070d1a;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 0;
}

/* ── Header ── */
header {
  background: #0d1b3e;
  border-bottom: 2px solid #1565C0;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
}
header .logo { font-size: 1.6rem; font-weight: 800; color: #42A5F5; letter-spacing: 2px; }
header .subtitulo { font-size: 0.85rem; color: #7090b0; }
#reloj {
  margin-left: auto;
  font-size: 1.3rem;
  font-weight: 700;
  color: #42A5F5;
  font-variant-numeric: tabular-nums;
}
#fecha { font-size: 0.8rem; color: #7090b0; text-align: right; }

/* ── Estado conexión ── */
#conexion {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  background: #1a2a1a;
  color: #66BB6A;
  border: 1px solid #2e7d32;
}
#conexion.err {
  background: #2a1a1a;
  color: #EF5350;
  border-color: #c62828;
}

/* ── Main ── */
main { padding: 20px 24px; }

.sin-datos {
  text-align: center;
  padding: 80px 20px;
  color: #37474F;
  font-size: 1.1rem;
}

/* ── Sección de línea ── */
.linea-seccion { margin-bottom: 28px; }
.linea-titulo {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: #42A5F5;
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid #1565C022;
}

/* ── Grid de operadores ── */
.ops-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

/* ── Card operador ── */
.op-card {
  background: linear-gradient(145deg, #0d1b3e, #091228);
  border: 1px solid #1565C033;
  border-radius: 14px;
  padding: 16px 14px 12px;
  width: 140px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  animation: fadeIn 0.4s ease;
  transition: border-color 0.3s;
}
.op-card:hover { border-color: #1565C0; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Foto / Avatar ── */
.foto-wrap {
  position: relative;
  width: 80px;
  height: 80px;
}
.foto-wrap img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #1565C0;
  display: block;
}
.avatar-iniciales {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #1565C033;
  border: 2px solid #1565C0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  font-weight: 700;
  color: #90CAF9;
}

/* Badge turno */
.turno-badge {
  position: absolute;
  bottom: 0;
  right: 0;
  background: #1565C0;
  color: #fff;
  font-size: 0.6rem;
  font-weight: 800;
  border-radius: 8px;
  padding: 2px 5px;
  border: 1px solid #0d47a1;
}

/* ── Nombre ── */
.op-nombre {
  font-size: 0.65rem;
  font-weight: 600;
  color: #cfd8e3;
  text-align: center;
  line-height: 1.3;
  max-height: 2.6em;
  overflow: hidden;
  word-break: break-word;
}
.op-num {
  font-size: 0.6rem;
  color: #42A5F5;
  font-weight: 500;
}

/* ── Footer estado ── */
footer {
  text-align: center;
  padding: 10px;
  font-size: 0.7rem;
  color: #263238;
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">HISENSE AMI</div>
    <div class="subtitulo">Operadores asignados hoy</div>
  </div>
  <span id="conexion">● EN VIVO</span>
  <div style="margin-left:auto; text-align:right;">
    <div id="reloj">--:--:--</div>
    <div id="fecha">--</div>
  </div>
</header>

<main id="main">
  <div class="sin-datos">Cargando operadores...</div>
</main>

<footer id="footer">Actualización automática cada 10 segundos</footer>

<script>
const API = window.location.origin;
const mainEl = document.getElementById('main');
const cnxEl  = document.getElementById('conexion');
const footEl = document.getElementById('footer');

// ── Reloj ──
function tick() {
  const now = new Date();
  document.getElementById('reloj').textContent = now.toLocaleTimeString('es-MX');
  document.getElementById('fecha').textContent =
    now.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
tick();
setInterval(tick, 1000);

// ── Iniciales ──
function iniciales(nombre) {
  const p = (nombre || '?').trim().split(' ');
  return ((p[0]?.[0] || '') + (p[1]?.[0] || '')).toUpperCase() || '?';
}

// ── Render ──
function render(data) {
  if (!data.lineas || data.lineas.length === 0) {
    mainEl.innerHTML = '<div class="sin-datos">Sin operadores asignados hoy</div>';
    return;
  }

  let html = '';
  for (const linea of data.lineas) {
    if (!linea.operadores.length) continue;
    html += `<div class="linea-seccion">
      <div class="linea-titulo">${linea.linea} — ${linea.operadores.length} operador${linea.operadores.length > 1 ? 'es' : ''}</div>
      <div class="ops-grid">`;

    for (const op of linea.operadores) {
      const fotoUrl = op.foto_url
        ? (op.foto_url.startsWith('http') ? op.foto_url : `${API}${op.foto_url}`)
        : null;

      const turno = op.turno
        ? `<span class="turno-badge">T-${op.turno}</span>` : '';

      const fotoHtml = fotoUrl
        ? `<img src="${fotoUrl}" alt="${op.nombre}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="avatar-iniciales" style="display:none">${iniciales(op.nombre)}</div>`
        : `<div class="avatar-iniciales">${iniciales(op.nombre)}</div>`;

      // Nombre: mostrar solo primeros dos apellidos + primer nombre
      const partes = (op.nombre || '').trim().split(' ');
      const nombreCorto = partes.slice(0, 3).join(' ');

      html += `
      <div class="op-card">
        <div class="foto-wrap">
          ${fotoHtml}
          ${turno}
        </div>
        <div class="op-nombre">${nombreCorto}</div>
        <div class="op-num">#${op.num_empleado}</div>
      </div>`;
    }

    html += `</div></div>`;
  }

  mainEl.innerHTML = html;
  footEl.textContent = `Última actualización: ${new Date().toLocaleTimeString('es-MX')} · ${data.fecha}`;
}

// ── Fetch ──
async function cargar() {
  try {
    const res = await fetch(`${API}/api/uph/dashboard/asignaciones-hoy`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
    cnxEl.textContent = '● EN VIVO';
    cnxEl.className = '';
  } catch (e) {
    cnxEl.textContent = '● SIN CONEXIÓN';
    cnxEl.className = 'err';
    console.error(e);
  }
}

cargar();
setInterval(cargar, 10000);
</script>
</body>
</html>
